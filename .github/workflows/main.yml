name: Build AndroGhostInjector

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install required SDK components
        run: |
          sdkmanager "platform-tools" \
                     "platforms;android-33" \
                     "build-tools;33.0.2"

      - name: Make gradlew executable
        run: chmod +x gradlew || true

      - name: Build project
        run: |
          if [ -f gradlew ]; then
            ./gradlew build
          else
            echo "No Gradle project, skipping..."
          fi

      # If repo uses native (NDK) build
      - name: Build native code (if exists)
        run: |
          if [ -f "jni/Android.mk" ] || [ -d "cpp" ]; then
            echo "Building native libs..."
            ndk-build || true
          fi

      - name: Package artifact
        run: |
          mkdir output
          cp -r ./* output/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AndroGhostInjector-build
          path: output/
